name: Weekly content sync

# Refreshes publications (ORCID), protocol templates + databases.json, and
# network logos (PHD-Center/AsPEN) once a week. Commits + redeploys only when
# something actually changed. Can also be run on demand from the Actions tab.
on:
  schedule:
    - cron: "0 2 * * 1" # Mondays 02:00 UTC (10:00 Taiwan)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Sync external content
        run: node scripts/sync-content.mjs
        env:
          # Optional: enables reliable Google Scholar citation/h-index sync from
          # CI (datacenter IPs are blocked from scraping the page directly).
          # Get a free key at serpapi.com and add it as a repo Actions secret.
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

      - name: Detect changes
        id: detect
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git status --short
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No content changes this week."
          fi

      - name: Commit changes
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: weekly content sync (publications, templates, logos)"
          git push

      - name: Build
        if: steps.detect.outputs.changed == 'true'
        run: npm run build

      - name: Upload Pages artifact
        if: steps.detect.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
